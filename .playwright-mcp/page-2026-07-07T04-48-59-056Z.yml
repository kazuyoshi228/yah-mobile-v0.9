            - button "What is an eSIM? +" [ref=e204] [cursor=pointer]:
              - generic [ref=e205]: What is an eSIM?
              - generic [ref=e206]: +
            - paragraph [ref=e207]: An eSIM (embedded SIM) is a digital SIM built into your device. There's no physical card to swap — just scan a QR code or tap a button to start using mobile data.
          - generic [ref=e209]:
            - button "When should I set it up? +" [ref=e210] [cursor=pointer]:
              - generic [ref=e211]: When should I set it up?
              - generic [ref=e212]: +
            - paragraph [ref=e213]: We recommend installing your eSIM on Wi-Fi before you depart. Once installed, it connects automatically when you arrive in Japan — no setup needed at the airport.
          - generic [ref=e215]:
            - button "When does my data plan start? +" [ref=e216] [cursor=pointer]:
              - generic [ref=e217]: When does my data plan start?
              - generic [ref=e218]: +
            - paragraph [ref=e219]: Your plan validity period begins from the moment your eSIM first connects to the network in Japan. Days do not count while you are outside Japan.
          - generic [ref=e221]:
            - button "Is my device compatible? +" [ref=e222] [cursor=pointer]:
              - generic [ref=e223]: Is my device compatible?
              - generic [ref=e224]: +
            - paragraph [ref=e225]: Compatible devices include iPhone XS and later, Google Pixel 3 and later, and Samsung Galaxy S20 and later. Your device must also be SIM-unlocked.
          - generic [ref=e227]:
            - button "What happens when I run out of data? +" [ref=e228] [cursor=pointer]:
              - generic [ref=e229]: What happens when I run out of data?
              - generic [ref=e230]: +
            - paragraph [ref=e231]: You can top up with additional data anytime from the app or your account page. You'll also receive an email alert when your data is running low.
          - generic [ref=e233]:
            - button "Does it include a phone number? +" [ref=e234] [cursor=pointer]:
              - generic [ref=e235]: Does it include a phone number?
              - generic [ref=e236]: +
            - paragraph [ref=e237]: yah.mobile is a data-only eSIM. Voice calls and SMS are not supported, but app-based calls via LINE, WhatsApp, and similar services work fine.
          - generic [ref=e239]:
            - button "Can I get a refund? +" [ref=e240] [cursor=pointer]:
              - generic [ref=e241]: Can I get a refund?
              - generic [ref=e242]: +
            - paragraph [ref=e243]: eSIM is a digital product. Once your payment is completed, cancellations and refunds are not available. You confirm this policy via a checkbox before completing your purchase. If you have any questions, please contact us via chat before buying.
          - generic [ref=e245]:
            - button "Can I use it on multiple devices? +" [ref=e246] [cursor=pointer]:
              - generic [ref=e247]: Can I use it on multiple devices?
              - generic [ref=e248]: +
            - paragraph [ref=e249]: Each eSIM is tied to one device. If you need data on multiple devices, you'll need to purchase a separate plan for each.
          - generic [ref=e251]:
            - button "Will it work on the bullet train (Shinkansen)? +" [ref=e252] [cursor=pointer]:
              - generic [ref=e253]: Will it work on the bullet train (Shinkansen)?
              - generic [ref=e254]: +
            - paragraph [ref=e255]: Yes. yah.mobile runs on KDDI, one of Japan's largest networks. Coverage is excellent on Shinkansen routes and in major cities. Some rural tunnels may have limited signal.
          - generic [ref=e257]:
            - button "How do I receive my eSIM? +" [ref=e258] [cursor=pointer]:
              - generic [ref=e259]: How do I receive my eSIM?
              - generic [ref=e260]: +
            - paragraph [ref=e261]: After purchase, your QR code is delivered instantly to your registered email and is also available in your account under My Orders. No waiting, no shipping.
